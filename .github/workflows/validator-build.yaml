name: Gamedata Validator Build

on:
  workflow_call:
    inputs:
      channel:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # the CounterStrikeSharp release apps/counterstrikesharp actually ships. Validating
      # gamedata from a release we don't run reports breaks we don't have, and hides the
      # ones we do. The SwiftlyS2 version is resolved at run time, not baked here.
      - name: Resolve upstream refs
        run: bash apps/gamedata-validator/scripts/resolve-refs.sh >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/gamedata-validator/Dockerfile
          push: true
          build-args: |
            CCS_GAMEDATA_REF=${{ env.CCS_GAMEDATA_REF }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/gamedata-validator:${{ inputs.channel }}
            ghcr.io/${{ github.repository_owner }}/gamedata-validator:${{ github.sha }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/gamedata-validator:buildcache
          cache-to: |
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/gamedata-validator:buildcache,mode=max

      - name: Delete Package Versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: gamedata-validator
          package-type: container
          min-versions-to-keep: 5
          ignore-versions: '^buildcache-*'
