name: Build, Push, and Release Plugin

on:
  push:
    branches:
      - "main"
  workflow_dispatch:
    description: "build"

jobs:
  build-push-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Test
        run: dotnet test test/FiveStack.Tests.csproj -c Release

      - name: Get next release version
        id: get_latest_release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const latestRelease = releases.data[0];
            if (latestRelease && latestRelease.tag_name.startsWith('v0.0.')) {
              return parseInt(latestRelease.tag_name.replace('v0.0.', '')) + 1;
            }
            return 1;

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build plugin zip (dotnet publish inside Docker)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: mod-builder:latest
          target: zip-creator
          build-args: |
            RELEASE_VERSION=0.0.${{ steps.get_latest_release.outputs.result }}

      - name: Extract zip file
        run: |
          docker create --name temp mod-builder:latest
          docker cp temp:/mod-release.zip ./FiveStack-v0.0.${{ steps.get_latest_release.outputs.result }}.zip
          docker rm temp

      - name: Build and Push server Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/swiftly-game-server:latest
            ghcr.io/${{ github.repository_owner }}/swiftly-game-server:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/swiftly-game-server:v0.0.${{ steps.get_latest_release.outputs.result }}
          build-args: |
            RELEASE_VERSION=0.0.${{ steps.get_latest_release.outputs.result }}

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v0.0.${{ steps.get_latest_release.outputs.result }}
          name: v0.0.${{ steps.get_latest_release.outputs.result }}
          draft: false
          prerelease: false
          files: |
            ./FiveStack-v0.0.${{ steps.get_latest_release.outputs.result }}.zip
