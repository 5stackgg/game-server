name: Check SwiftlyS2 Release

on:
  workflow_dispatch:
    description: "Manually trigger SwiftlyS2 update check"
  schedule:
    - cron: "0 6 * * 1"

jobs:
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve current and latest SwiftlyS2 versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT=$(grep -oP 'SWIFTLYS2_VERSION="\K[^"]+' Dockerfile)
          LATEST=$(curl -sSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/swiftly-solution/swiftlys2/releases?per_page=40" \
            | jq -r '[.[] | select(.prerelease == false) | select(.tag_name | test("-beta") | not)] | .[0].tag_name')
          echo "CURRENT=$CURRENT" >> "$GITHUB_ENV"
          echo "LATEST=$LATEST" >> "$GITHUB_ENV"
          echo "current=$CURRENT latest=$LATEST"

      - name: Update Dockerfile and csproj
        if: env.LATEST != '' && env.LATEST != 'null' && env.CURRENT != env.LATEST
        run: |
          NUGET_VERSION="${LATEST#v}"
          sed -i "s|SWIFTLYS2_VERSION=\"[^\"]*\"|SWIFTLYS2_VERSION=\"${LATEST}\"|" Dockerfile
          sed -i "s|<PackageReference Include=\"SwiftlyS2.CS2\" Version=\"[^\"]*\"|<PackageReference Include=\"SwiftlyS2.CS2\" Version=\"${NUGET_VERSION}\"|" src/FiveStack.csproj
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add Dockerfile src/FiveStack.csproj
          git commit -m "chore: update SwiftlyS2 to ${LATEST}"
          git push
