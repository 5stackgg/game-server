# Local-dev only (not managed by the panel). CSS hot reload works through the
# plugins/FiveStack -> /opt/dev/css symlink created by setup.sh, so the dev
# volume mounts at /opt/dev. DEV_SWAPPED is injected by codepier during
# hot-swap sessions.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-game-server
  namespace: 5stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dev-game-server
  template:
    metadata:
      labels:
        app: dev-game-server
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      dnsConfig:
        options:
          - name: ndots
            value: '1'
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: 5stack-dev-server
                    operator: In
                    values:
                      - 'true'
      containers:
        - name: dev-game-server
          image: ghcr.io/5stackgg/game-server-css:beta
          imagePullPolicy: Always
          ports:
            - containerPort: 27015
              protocol: TCP
            - containerPort: 27015
              protocol: UDP
            - containerPort: 27020
              protocol: TCP
            - containerPort: 27020
              protocol: UDP
          envFrom:
            - secretRef:
                name: dev-server-secrets
          env:
            - name: DEV_SERVER
              value: 'true'
            - name: SERVER_PORT
              value: '27015'
            - name: TV_PORT
              value: '27020'
            - name: EXTRA_GAME_PARAMS
              value: '-maxplayers 13 +map de_overpass'
            - name: ALLOW_BOTS
              value: 'true'
            - name: STEAM_RELAY
              value: 'true'
          volumeMounts:
            - name: steamcmd
              mountPath: /serverdata/steamcmd
            - name: serverfiles
              mountPath: /serverdata/serverfiles
            - name: serverfiles-csgo
              mountPath: /serverdata/serverfiles-csgo
            - name: demos
              mountPath: /opt/demos
            - name: custom-plugins
              mountPath: /opt/custom-plugins
            - name: dev
              mountPath: /opt/dev
      volumes:
        - name: steamcmd
          hostPath:
            path: /opt/5stack/steamcmd
            type: DirectoryOrCreate
        - name: serverfiles
          hostPath:
            path: /opt/5stack/serverfiles
            type: DirectoryOrCreate
        - name: serverfiles-csgo
          hostPath:
            path: /opt/5stack/serverfiles-csgo
            type: DirectoryOrCreate
        - name: demos
          hostPath:
            path: /opt/5stack/demos
            type: DirectoryOrCreate
        - name: custom-plugins
          hostPath:
            path: /opt/5stack/custom-plugins
            type: DirectoryOrCreate
        - name: dev
          hostPath:
            path: /opt/5stack/dev
            type: DirectoryOrCreate
