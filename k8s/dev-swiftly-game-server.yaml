# Local-dev only (not managed by the panel). The dev volume's sw/ subfolder is
# mounted directly onto the plugin dir so SwiftlyS2 AutoHotReload's watcher sees
# builds (symlinks don't work with its recursive FileSystemWatcher).
# DEV_SWAPPED is injected by codepier during hot-swap sessions.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-swiftly-game-server
  namespace: 5stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dev-swiftly-game-server
  template:
    metadata:
      labels:
        app: dev-swiftly-game-server
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: 5stack-dev-server
                    operator: In
                    values:
                      - 'true'
      containers:
        - name: dev-swiftly-game-server
          image: ghcr.io/5stackgg/game-server-sw:beta
          imagePullPolicy: Always
          ports:
            - containerPort: 27016
              protocol: TCP
            - containerPort: 27016
              protocol: UDP
            - containerPort: 27021
              protocol: TCP
            - containerPort: 27021
              protocol: UDP
          envFrom:
            - secretRef:
                name: dev-swiftly-server-secrets
          env:
            - name: DEV_SERVER
              value: 'true'
            - name: SERVER_PORT
              value: '27016'
            - name: TV_PORT
              value: '27021'
            - name: EXTRA_GAME_PARAMS
              value: '-maxplayers 13 +map de_overpass'
            - name: ALLOW_BOTS
              value: 'true'
            - name: STEAM_RELAY
              value: 'true'
          volumeMounts:
            - name: steamcmd
              mountPath: /serverdata/steamcmd
            - name: serverfiles
              mountPath: /serverdata/serverfiles
            - name: serverfiles-csgo
              mountPath: /serverdata/serverfiles-csgo
            - name: demos
              mountPath: /opt/demos
            - name: custom-plugins
              mountPath: /opt/custom-plugins
            - name: dev
              mountPath: /opt/instance/game/csgo/addons/swiftlys2/plugins/FiveStack
              subPath: sw
      volumes:
        - name: steamcmd
          hostPath:
            path: /opt/5stack/steamcmd
            type: DirectoryOrCreate
        - name: serverfiles
          hostPath:
            path: /opt/5stack/serverfiles
            type: DirectoryOrCreate
        - name: serverfiles-csgo
          hostPath:
            path: /opt/5stack/serverfiles-csgo
            type: DirectoryOrCreate
        - name: demos
          hostPath:
            path: /opt/5stack/demos
            type: DirectoryOrCreate
        - name: custom-plugins
          hostPath:
            path: /opt/5stack/custom-plugins
            type: DirectoryOrCreate
        - name: dev
          hostPath:
            path: /opt/5stack/dev
            type: DirectoryOrCreate
